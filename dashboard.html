<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PlaceBridge Dashboard – Check eligibility, apply to companies, and track your placement progress.">
  <title>PlaceBridge – Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>

  <!-- ========== Navbar ========== -->
  <nav class="dashboard-nav">
    <a href="index.html" class="logo">
      <div class="logo-icon">PB</div>
      <span class="logo-text">PlaceBridge</span>
    </a>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="companiesTab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Companies
      </button>
      <button class="nav-tab" data-tab="applicationsTab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        My Applications
      </button>
      <button class="nav-tab" data-tab="alertsTab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Alerts
      </button>
    </div>
    <div class="nav-right">
      <a href="index.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Home
      </a>
      <div class="notification-bell" id="notifBell">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge">6</span>
      </div>
    </div>
  </nav>

  <!-- ========== Main Content ========== -->
  <main class="dashboard-container">

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Total Companies</span>
          <div class="stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statTotal">12</div>
        <div class="stat-change">Active this season</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Eligible For</span>
          <div class="stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statEligible">0</div>
        <div class="stat-change">Run eligibility check</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Applied</span>
          <div class="stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statApplied">0</div>
        <div class="stat-change">Companies applied to</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Avg Package</span>
          <div class="stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statAvgPkg">—</div>
        <div class="stat-change">Eligible roles avg</div>
      </div>
    </div>

    <!-- ========== Companies Tab ========== -->
    <div class="tab-content active" id="companiesTab">

      <!-- Student Profile Card -->
      <div class="glass-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Student Profile
          </h2>
        </div>
        <div class="profile-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="studentName" placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label>CGPA</label>
            <input type="number" id="studentCGPA" placeholder="e.g. 8.5" min="0" max="10" step="0.1">
          </div>
          <div class="form-group">
            <label>Active Backlogs</label>
            <input type="number" id="studentBacklogs" placeholder="0" min="0" max="20" value="0">
          </div>
          <div class="form-group">
            <button class="btn-check" onclick="checkEligibility()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              Check Eligibility
            </button>
          </div>
        </div>
        <div style="margin-top: 16px;">
          <label style="font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500;">Select Your Skills</label>
          <div class="skills-container" id="skillsContainer"></div>
        </div>
      </div>

      <!-- Companies Grid -->
      <div class="glass-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            Placement Companies
          </h2>
          <span style="font-size:13px; color: rgba(255,255,255,0.4)">12 companies · 60+ roles</span>
        </div>
        <div class="companies-grid" id="companiesGrid"></div>
      </div>
    </div>

    <!-- ========== Applications Tab ========== -->
    <div class="tab-content" id="applicationsTab">
      <div class="glass-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            My Applications
          </h2>
          <span style="font-size:13px; color: rgba(255,255,255,0.4)" id="appCount">0 applications</span>
        </div>
        <div class="applications-list" id="applicationsList"></div>
      </div>
    </div>

    <!-- ========== Alerts Tab ========== -->
    <div class="tab-content" id="alertsTab">
      <div class="glass-card">
        <div class="card-header">
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Notifications & Alerts
          </h2>
        </div>
        <div class="alerts-list" id="alertsList"></div>
      </div>
    </div>

  </main>

  <!-- ========== Modal ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ========== Toast Container ========== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="dashboard.js"></script>
</body>
</html>
